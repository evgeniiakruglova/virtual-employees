<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Virtual Employees — Vlad Yasko</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header class="hero">
            <h1>My Virtual Employees</h1>
            <p class="hero-sub">Working AI tools. Not demos. Take it — use it.</p>
        </header>

        <div class="filters">
            <button class="filter-btn active" data-filter="all">All</button>
        </div>

        <div class="table-wrapper">
            <table class="skills-table">
                <thead>
                    <tr>
                        <th>Tool</th>
                        <th>Description</th>
                        <th>Category</th>
                        <th>Stream</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody id="skills-body">
                </tbody>
            </table>
        </div>
    </div>

    <!-- Modal -->
    <div class="modal-overlay" id="modal-overlay">
        <div class="modal">
            <button class="modal-close" id="modal-close">&times;</button>
            <div class="modal-scroll">

                <!-- Header -->
                <div class="modal-header">
                    <span class="modal-badge" id="modal-badge"></span>
                    <h2 id="modal-title"></h2>
                    <div class="modal-meta" id="modal-meta"></div>
                </div>

                <!-- Description -->
                <div class="modal-section">
                    <div class="section-label">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
                        DESCRIPTION
                    </div>
                    <p class="detail-text" id="modal-detail"></p>
                </div>

                <!-- Instructions -->
                <div class="modal-section" id="section-instruction">
                    <div class="section-label">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 3v18"/></svg>
                        INSTRUCTIONS
                    </div>
                    <div class="section-items" id="instruction-items"></div>
                    <div class="instruction-preview" id="instruction-preview" style="display:none">
                        <div class="copy-success" id="copy-success">Copied!</div>
                        <div class="preview-actions">
                            <button class="btn btn-sm btn-primary" id="btn-copy">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
                                Copy
                            </button>
                            <button class="btn btn-sm btn-secondary" id="btn-download-txt">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                                Download .txt
                            </button>
                        </div>
                        <pre><code id="modal-code"></code></pre>
                    </div>
                </div>

                <!-- Materials -->
                <div class="modal-section" id="section-materials" style="display:none">
                    <div class="section-label">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/></svg>
                        PROJECT FILES
                    </div>
                    <div class="section-items" id="material-items"></div>
                </div>

                <!-- Skill -->
                <div class="modal-section" id="section-skill" style="display:none">
                    <div class="section-label">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 00-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0020 4.77 5.07 5.07 0 0019.91 1S18.73.65 16 2.48a13.38 13.38 0 00-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 005 4.77a5.44 5.44 0 00-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 009 18.13V22"/></svg>
                        SKILL FOR CLAUDE CODE
                    </div>
                    <div class="section-items" id="skill-items"></div>
                </div>

            </div>
        </div>
    </div>

    <script src="data.js"></script>
    <script src="app.js"></script>
</body>
</html>
